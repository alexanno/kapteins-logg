<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kart — M/S Frierholmen</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --navy:       #0d1b2a;
      --navy-light: #1e3347;
      --amber:      #a87028;
      --parchment:  #f5edd8;
      --border:     #c9ab82;
      --ink:        #1c0f04;
      --muted:      #7a6045;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--navy);
    }

    /* ── Masthead ────────────────────────────────────── */
    .masthead {
      background: var(--navy);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    .masthead-left { display: flex; align-items: baseline; gap: 14px; }

    .ship-label {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--amber);
    }

    .masthead h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f0e8d2;
      line-height: 1;
    }

    .masthead-nav { display: flex; gap: 16px; align-items: center; }

    .masthead-nav a {
      font-size: 0.8rem;
      color: #8da8bb;
      text-decoration: none;
      border-bottom: 1px solid rgba(141, 168, 187, 0.3);
      transition: color 120ms, border-color 120ms;
      white-space: nowrap;
    }

    .masthead-nav a:hover { color: var(--amber); border-color: var(--amber); }

    /* ── Map ─────────────────────────────────────────── */
    #map {
      flex: 1;
      width: 100%;
    }

    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Leaflet popup ───────────────────────────────── */
    .leaflet-popup-content-wrapper {
      background: #fff8ed;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(13,27,42,0.18);
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
    }

    .leaflet-popup-tip { background: #fff8ed; }

    .popup-date {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .popup-coords {
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 6px;
    }

    .popup-obs {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      border-top: 1px solid var(--border);
      padding-top: 6px;
    }

    .popup-dag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #fff;
      background: var(--amber);
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div class="masthead-left">
      <span class="ship-label">M/S Frierholmen</span>
      <h1>Kart over reisen</h1>
    </div>
    <nav class="masthead-nav">
      <a href="index.html">← Loggbok</a>
      <a href="om.html">Om prosjektet</a>
    </nav>
  </header>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map("map", { zoomControl: true });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom: 19,
  }).addTo(map);

  function parseLogbook(text) {
    const parts = text.split(/\n---\n/);
    const entries = [];

    for (const part of parts) {
      const trimmed = part.trim();
      if (!trimmed.startsWith("##")) continue;

      const headerLine = trimmed.split(/\r?\n/)[0].replace(/^##\s*/, "").trim();
      const pipeIdx = headerLine.indexOf("|");
      if (pipeIdx === -1) continue;

      const datePart  = headerLine.slice(0, pipeIdx).trim();
      const coordStr  = headerLine.slice(pipeIdx + 1).trim();

      // Parse "58.6074°N, 9.1367°Ø"
      const m = coordStr.match(/([\d.]+)°N,\s*([\d.]+)°/);
      if (!m) continue;

      const lat = parseFloat(m[1]);
      const lon = parseFloat(m[2]);

      // Grab obs line if present
      const lines = trimmed.split(/\r?\n/);
      let obs = "";
      for (let i = 1; i < lines.length; i++) {
        const l = lines[i].trim();
        if (!l) continue;
        if (l.startsWith("_") && l.endsWith("_")) {
          obs = l.slice(1, -1)
            .replace(/\*\*(.+?)\*\*/g, "$1");
        }
        break;
      }

      entries.push({ datePart, coordStr, lat, lon, obs });
    }

    return entries;
  }

  async function init() {
    const res = await fetch("logbook.md", { cache: "no-store" });
    const text = await res.text();
    const entries = parseLogbook(text);

    if (!entries.length) return;

    // Entries are newest-first; reverse for chronological polyline
    const chrono = [...entries].reverse();

    // Draw route line
    const latlngs = chrono.map(e => [e.lat, e.lon]);
    L.polyline(latlngs, {
      color: "#a87028",
      weight: 1.5,
      opacity: 0.5,
      dashArray: "4 6",
    }).addTo(map);

    // Draw markers (oldest → newest, so newest renders on top)
    chrono.forEach((entry, i) => {
      const isNewest = i === chrono.length - 1;
      const dayNum   = i + 1;

      const marker = L.circleMarker([entry.lat, entry.lon], {
        radius:      isNewest ? 8 : 6,
        color:       "#0d1b2a",
        weight:      isNewest ? 2 : 1,
        fillColor:   isNewest ? "#a87028" : "#c9ab82",
        fillOpacity: isNewest ? 1 : 0.75,
      }).addTo(map);

      const obsHtml = entry.obs
        ? `<div class="popup-obs">${entry.obs}</div>`
        : "";

      marker.bindPopup(`
        <div class="popup-dag">Dag ${dayNum}</div>
        <div class="popup-date">${entry.datePart}</div>
        <div class="popup-coords">${entry.coordStr}</div>
        ${obsHtml}
      `, { maxWidth: 260 });
    });

    // Fit map to all markers
    map.fitBounds(L.latLngBounds(latlngs), { padding: [40, 40] });
  }

  init();
</script>
</body>
</html>
